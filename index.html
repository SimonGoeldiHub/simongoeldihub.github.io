<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Checkout Trainer 🎯</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

canvas{
background:white;
border:2px solid black;
margin-top:20px;
}

#score{
font-size:28px;
margin-top:10px;
}

#info{
font-size:18px;
margin-top:10px;
}
</style>

</head>
<body>

<h1>Checkout Trainer 🎯</h1>

<div id="score"></div>
<canvas id="board" width="500" height="500"></canvas>
<div id="info"></div>

<script>

const numbers=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5]

const checkouts={
61:{optimal:["T15","D8"],miss:["S15","S14","D16"]},
62:{optimal:["T10","D16"],miss:["S10","S20","D16"]},
63:{optimal:["T13","D12"],miss:["S13","S18","D16"]},
64:{optimal:["T16","D8"],miss:["S16","S16","D16"]},
65:{optimal:["T11","D16"],miss:["S11","S14","D20"]},
66:{optimal:["T10","D18"],miss:["S10","S16","D20"]},
67:{optimal:["T17","D8"],miss:["S17","S18","D16"]},
68:{optimal:["T20","D4"],miss:["S20","S16","D16"]},
69:{optimal:["T15","D12"],miss:["S15","S14","D20"]},
70:{optimal:["T18","D8"],miss:["S18","S20","D16"]},
80:{optimal:["T20","D10"],miss:["S20","S20","D20"]},
100:{optimal:["T20","D20"],miss:["S20","T20","D10"]},
170:{optimal:["T20","T20","D25"]}
}

const canvas=document.getElementById("board")
const ctx=canvas.getContext("2d")

const center=250
const radius=200

let score
let optimal=[]
let miss=[]
let step=0

function drawBoard(){

let rings=[200,170,120,90,30,10]

rings.forEach(r=>{
ctx.beginPath()
ctx.arc(center,center,r,0,Math.PI*2)
ctx.stroke()
})

for(let i=0;i<20;i++){

let angle=(i*18-81)*Math.PI/180

let x0=center+30*Math.cos(angle)
let y0=center+30*Math.sin(angle)

let x1=center+radius*Math.cos(angle)
let y1=center+radius*Math.sin(angle)

ctx.beginPath()
ctx.moveTo(x0,y0)
ctx.lineTo(x1,y1)
ctx.stroke()
}

numbers.forEach((n,i)=>{

let angle=(i*18-90)*Math.PI/180
let x=center+220*Math.cos(angle)
let y=center+220*Math.sin(angle)

ctx.fillText(n,x,y)

})

}

function newRound(){

let keys=Object.keys(checkouts)
score=keys[Math.floor(Math.random()*keys.length)]

optimal=[...checkouts[score].optimal]
miss=checkouts[score].miss||[]

step=0

document.getElementById("score").innerText="Score: "+score
document.getElementById("info").innerText=""

}

function getField(x,y){

let dx=x-center
let dy=y-center

let dist=Math.sqrt(dx*dx+dy*dy)

let angle=(Math.atan2(dy,dx)*180/Math.PI+81+360)%360
let sector=Math.floor(angle/18)%20

let number=numbers[sector]

if(dist<10) return "Bull"
if(dist<30) return "Outer Bull"
if(dist>90 && dist<120) return "T"+number
if(dist>170 && dist<200) return "D"+number
if(dist<200) return "S"+number

return null

}

canvas.addEventListener("click",e=>{

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let field=getField(x,y)

if(!field) return

let correct=optimal[step]

if(field===correct){

step++

if(step>=optimal.length){

document.getElementById("info").innerText="✅ Checkout!"

setTimeout(newRound,1500)

}else{

document.getElementById("info").innerText="Richtig!"

}

}else{

document.getElementById("info").innerText="❌ Falsch ("+field+")"

}

})

drawBoard()
newRound()

</script>

</body>
</html>
