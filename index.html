const size = Math.min(window.innerWidth-4, 500);

const center = size / 2;

let _miss=[];

 let rings=[
    radius,
    radius*0.85,
    radius*0.6,
    radius*0.45,
    radius*0.15,
    radius*0.05]
// Dartboard zeichnen
function drawBoard(){

    rings.forEach(r=>{
        ctx.beginPath();
        ctx.arc(center,center,r,0,Math.PI*2);
        ctx.stroke();
    });

    for(let i=0;i<20;i++){
    let angle=(i*18-81)*Math.PI/180;

    let x0=center+radius*0.15*Math.cos(angle);
    let y0=center+radius*0.15*Math.sin(angle);

    let x1=center+radius*Math.cos(angle);
    let y1=center+radius*Math.sin(angle);

    ctx.beginPath();
    ctx.moveTo(x0,y0);
    ctx.lineTo(x1,y1);
    ctx.stroke();
    }

    numbers.forEach((n,i)=>{
        let angle=(i*18-90)*Math.PI/180;
        let x=center+radius*1.1*Math.cos(angle);
        let y=center+radius*1.1*Math.sin(angle);
        ctx.font="20px Arial";
        ctx.fillStyle="black";
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText(n,x,y);
    });
}

// neue Runde starten
function newRound(){

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBoard();

    let keys= Object.keys(checkouts);
    score=keys[Math.floor(Math.random()*keys.length)];
    rest=score
    optimal=[...checkouts[score].optimal];
    miss=checkouts[score].miss||[];
    miss2=checkouts[score].miss2||[];
    _optimal=checkouts[score]._optimal||[];
    _miss=checkouts[score]._miss||[];
    _miss2=checkouts[score]._miss2||[];
    alternative=checkouts[score].alt||[];
    step=0;
    missActivated=false;
    miss2Activated=false;
    alt_act = false
    false_click=0;
    standard = true;

    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("info").innerText="";
}

// Feld bestimmen
function getField(x,y){
    let dx=x-center;
    let dy=y-center;
    let dist=Math.sqrt(dx*dx+dy*dy);
    let angle=(Math.atan2(dy,dx)*180/Math.PI+99+360)%360;
    let sector=Math.floor(angle/18)%20;
    let number=numbers[sector];

    if(dist<rings[5]) return "D25";
    if(dist<rings[4]) return "S25";
    if(dist>rings[3] && dist<rings[2]) return "T"+number;
    if(dist>rings[1] && dist<rings[0]) return "D"+number;
    if(dist<rings[0]) return "S"+number;

    return null;
}

// Mittelpunkt eines Feldes (für Miss-Route)
function getFieldCenter(field){
    let number, type;
    if(field==="D25" || field==="S25") return {x:center,y:center};
    if(field.startsWith("S")) type="S", number=parseInt(field.slice(1));
    else if(field.startsWith("T")) type="T", number=parseInt(field.slice(1));
    else if(field.startsWith("D")) type="D", number=parseInt(field.slice(1));

    let sector=numbers.indexOf(number);
    let angle=(sector*18-90)*Math.PI/180;

    let r;
    if(type==="S") r=(rings[1]+rings[2])/2;
    if(type==="T") r=(rings[2]+rings[3])/2;
    if(type==="D") r=(rings[0]+rings[1])/2;

    return {x:center + r*Math.cos(angle), y:center + r*Math.sin(angle)};
}

// Klick-Event

canvas.addEventListener("click", e=>{
    let rect=canvas.getBoundingClientRect();
    let x=e.clientX-rect.left;
    let y=e.clientY-rect.top;
    let field=getField(x,y);
    if(!field) return;
    let alt_out = alternative[step];
    let alt=_optimal[step];
    let correct=optimal[step];
    let alt_ind= false;
    let miss_test = _miss[step];

    if (alt_out && field===alt_out && field!==correct && optimal[0]===alternative[0] && field!==alt && step<2){
        
        correct=alt_out; alt_ind=true; optimal=alternative;
    }
    if (alt_out && field===alt_out && field!==correct && alt_act && _optimal[0]===alternative[0] && field!==alt && step<2){
        alt=alt_out; alt_ind=true; _optimal=alternative;    
    }

    if(field===alt && alt && field!==correct && step===0){alt_act=true}
    if(field===alt && alt && field!==correct && _optimal[0]===optimal[0] && step===1){alt_act=true}

        // ⚡ Miss nur nach erstem Dart
        false_click=0;
        if(step===0 && !alt_ind && !missActivated && miss.length>0 && Math.random()<0.5){
            optimal=miss;
            missActivated=true;
            hit=false;
            document.getElementById("info").innerText=`⚠️ Miss ${optimal[step]}`;
        }
        if(step===1 && !alt_ind && !missActivated && !miss2Activated && miss2.length>0 && Math.random()<0.5){
            optimal=miss2;
            miss2Activated=true;
            hit=false;
            document.getElementById("info").innerText=`⚠️ Miss ${optimal[step]}`;
        }

        rest = rest - values[optimal[step][0]] * parseInt(optimal[step].slice(1));

        // Punkt malen
        ctx.beginPath();
        if(missActivated){
            let coords=getFieldCenter(optimal[step]);
            if (optimal[step] == "S25"){
                coords = {x:canvas.width/2, y:canvas.height/2+radius*0.1}
            }
            ctx.arc(coords.x, coords.y, 5, 0, Math.PI*2);
        } else if(miss2Activated){
            let coords=getFieldCenter(optimal[step]);
            if (optimal[step] == "S25"){
                coords = {x:canvas.width/2, y:canvas.height/2+radius*0.1}
            }
            ctx.arc(coords.x, coords.y, 5, 0, Math.PI*2);
        } else {
            ctx.arc(x, y, 5, 0, Math.PI*2);
        }
        ctx.fillStyle="green";
        ctx.fill();

        step++;
        if(step>=optimal.length){
            document.getElementById("info").innerText="✅ Checkout!";
            setTimeout(newRound,1500);   
        } else if(step<3 && hit && !alt_ind) {
            document.getElementById("info").innerText=`Hit ${field}!`;
        } else if(step<3 && hit && alt_ind) {
            document.getElementById("info").innerText=`Hit ${field} (alternative Route)!`;
        }
        hit=true;
    }else if(field===alt && alt_act){

        false_click=0;
        alt_act=true
        // ⚡ Miss nur nach erstem Dart
        if(step===0 && !missActivated && _miss.length>0 && Math.random()<0.5 && alt!==_miss){
            _optimal=_miss;
            missActivated=true;
            hit=false;
            document.getElementById("info").innerText=`⚠️ Miss ${_optimal[step]}`;
        }
        if(step===1 && !miss2Activated && _miss2.length>0 && Math.random()<0.5){
            _optimal=_miss2;
            miss2Activated=true;
            hit=false;
            document.getElementById("info").innerText=`⚠️ Miss ${_optimal[step]}`;
        }

        rest = rest - values[_optimal[step][0]] * parseInt(_optimal[step].slice(1));

        // Punkt malen
        ctx.beginPath();
        if(missActivated){
            let coords=getFieldCenter(_optimal[step]);
            if (_optimal[step] == "S25"){
                coords = {x:canvas.width/2, y:canvas.height/2+radius*0.1}
            }
            ctx.arc(coords.x, coords.y, 5, 0, Math.PI*2);
        } else if(miss2Activated){
            let coords=getFieldCenter(_optimal[step]);
            if (_optimal[step] == "S25"){
                coords = {x:canvas.width/2, y:canvas.height/2+radius*0.1}
            }
            ctx.arc(coords.x, coords.y, 5, 0, Math.PI*2);
        } else {
            ctx.arc(x, y, 5, 0, Math.PI*2);
        }
        ctx.fillStyle="green";
        ctx.fill();

        step++;
        if(step>=_optimal.length){
            document.getElementById("info").innerText="✅ Checkout!";
            setTimeout(newRound,1500);
        } else if(step<3 && hit && !alt_ind) {
            document.getElementById("info").innerText=`Hit ${field}!`;
        } else if(step<3 && hit && alt_ind) {
            document.getElementById("info").innerText=`Hit ${field} (alternative Route)!`;
        }
        hit=true;
    } else {
        false_click++
        if (false_click>3){ 
            if (alt_act){document.getElementById("info").innerText=`❌ Falsch (${field}) - Weg: ${_optimal.slice(step).join(", ")}`;
            } else {
                document.getElementById("info").innerText=`❌ Falsch (${field}) - optimaler Weg: ${optimal.slice(step).join(", ")}`;
            }

        }else if (false_click>2 && step>0){

            document.getElementById("info").innerText=`❌ Falsch (${field}), Rest: ${rest}`;
        }else{
            document.getElementById("info").innerText=`❌ Falsch (${field})`;
        }
    }
});

drawBoard();
newRound();
</script>
